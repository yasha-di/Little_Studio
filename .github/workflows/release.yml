# Release builds for platforms that cannot be produced locally.
#
# Tauri does not cross-compile: macOS bundles (.app/.dmg) must be built on
# macOS runners. Windows is included so a tag push produces the complete
# artifact set in one place. Builds are UNSIGNED and NOT notarized — beta
# policy; revisit before 1.0.
#
# Triggers: pushing a version tag (v0.31.2) or manual dispatch.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: windows-x64
            runner: windows-latest
            target: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build bundles
        run: npm run tauri build -- ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # The .app is delivered inside the .dmg — uploading a raw .app through
      # actions/upload-artifact strips executable bits and symlinks, which
      # breaks the bundle. Ship the .dmg; the .app stays in the runner's
      # bundle/macos/ for anyone who builds locally.
      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: little-studio-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
